<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Jarvis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header>
      <p class="subtitle">AI Command Center</p>
      <h1>Jarvis</h1>
    </header>
    <div id="dashboard-messages" style="display:none;"></div>
    <div class="dashboard-input-area">
      <button id="mic-btn">🎤</button>
      <textarea id="dashboard-input" placeholder="Talk to Jarvis... ideas, questions, anything." rows="1"></textarea>
      <button id="dashboard-send">→</button>
    </div>
    <main>
      <div id="thread-list">
        <p class="loading">Loading threads...</p>
      </div>
    </main>
    <button id="new-thread-btn">+ New Thread</button>
  </div>

  <!-- NEW THREAD FORM -->
  <div id="new-thread-view" style="display:none;">
    <header>
      <button onclick="closeNewThreadForm()" class="back-btn">← Cancel</button>
      <h1>New Thread</h1>
    </header>
    <main style="padding:20px;">
      <label class="form-label">Thread Name *</label>
      <input type="text" id="nt-name" placeholder="e.g. My Book, Safety Index..." class="form-input" />
      <label class="form-label">Platform</label>
      <select id="nt-platform" class="form-input">
        <option value="Claude">Claude</option>
        <option value="ChatGPT">ChatGPT</option>
        <option value="Grok">Grok</option>
        <option value="Other">Other</option>
      </select>
      <label class="form-label">Goal *</label>
      <textarea id="nt-goal" placeholder="What are you trying to accomplish?" class="form-input" rows="3"></textarea>
      <label class="form-label">Where You Left Off</label>
      <textarea id="nt-progress" placeholder="Paste context from your last session..." class="form-input" rows="3"></textarea>
      <label class="form-label">Next Steps</label>
      <textarea id="nt-nextstep" placeholder="What needs to happen next?" class="form-input" rows="2"></textarea>
      <label class="form-label">Decisions Made</label>
      <textarea id="nt-decisions" placeholder="What's already been decided?" class="form-input" rows="2"></textarea>
      <label class="form-label">Open Questions</label>
      <textarea id="nt-questions" placeholder="What's still unresolved?" class="form-input" rows="2"></textarea>
      <label class="form-label">Notes</label>
      <textarea id="nt-notes" placeholder="Any other context..." class="form-input" rows="3"></textarea>
      <button onclick="saveNewThread()" class="btn-primary">Save Thread</button>
      <div style="height:40px;"></div>
    </main>
  </div>

  <!-- EDIT THREAD FORM -->
  <div id="edit-thread-view" style="display:none;">
    <header>
      <button onclick="closeEditThread()" class="back-btn">← Cancel</button>
      <h1>Edit Thread</h1>
    </header>
    <main style="padding:20px;">
      <label class="form-label">Thread Name</label>
      <input type="text" id="et-name" class="form-input" />
      <label class="form-label">Status</label>
      <select id="et-status" class="form-input">
        <option value="Active">Active</option>
        <option value="Paused">Paused</option>
        <option value="Complete">Complete</option>
      </select>
      <label class="form-label">Goal</label>
      <textarea id="et-goal" class="form-input" rows="3"></textarea>
      <label class="form-label">Current Progress</label>
      <textarea id="et-progress" class="form-input" rows="4"></textarea>
      <label class="form-label">Next Steps</label>
      <textarea id="et-nextstep" class="form-input" rows="2"></textarea>
      <label class="form-label">Decisions Made</label>
      <textarea id="et-decisions" class="form-input" rows="2"></textarea>
      <label class="form-label">Open Questions</label>
      <textarea id="et-questions" class="form-input" rows="2"></textarea>
      <label class="form-label">Notes</label>
      <textarea id="et-notes" class="form-input" rows="4"></textarea>
      <button onclick="saveEditThread()" class="btn-primary">Save Changes</button>
      <button onclick="deleteThread()" class="btn-danger">Delete Thread</button>
      <div style="height:40px;"></div>
    </main>
  </div>

  <!-- THREAD VIEW: BOARD + CHAT -->
  <div id="thread-view" style="display:none;">
    <header class="chat-header">
      <button onclick="backToDashboard()" class="back-btn">← Back</button>
      <h2 id="thread-title"></h2>
      <button onclick="openEditThread()" class="edit-btn">✏️</button>
      <button onclick="saveProgress()" class="save-btn">💾</button>
    </header>
    <div id="board-container">
      <div id="board-content">
        <p class="loading" style="margin-top:30px;">Jarvis is building your board...</p>
      </div>
    </div>
    <div id="chat-panel">
      <div id="chat-messages"></div>
      <div class="chat-input-area">
        <button id="mic-btn">🎤</button>
        <textarea id="chat-input" placeholder="Talk to Jarvis..." rows="1"></textarea>
        <button id="send-btn">→</button>
      </div>
    </div>
  </div>

  <!-- CARD DETAIL OVERLAY -->
  <div class="overlay" id="card-overlay">
    <div class="overlay-inner">
      <button class="overlay-close" onclick="closeCardDetail()">×</button>
      <div class="ov-zone" id="ov-zone"></div>
      <div class="ov-title" id="ov-title"></div>
      <div class="ov-body" id="ov-body"></div>
      <div class="ov-section">
        <div class="ov-section-label">Why This Matters</div>
        <div class="ov-section-body" id="ov-why"></div>
      </div>
      <div class="ov-section">
        <div class="ov-section-label">Next Action</div>
        <div class="ov-section-body" id="ov-next"></div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>
</body>
</html>
