<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jarvis</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- DASHBOARD -->
  <div id="dashboard">
    <header>
      <p class="subtitle">AI Command Center</p>
      <h1>Jarvis</h1>
    </header>
    <main>
      <div id="thread-list">
        <p class="loading">Loading threads...</p>
      </div>
    </main>
    <button id="new-thread-btn">+ New Thread</button>
  </div>

  <!-- CHAT VIEW -->
  <div id="chat-view" style="display:none;">
    <header class="chat-header">
      <button onclick="backToDashboard()" class="back-btn">← Back</button>
      <h2 id="thread-title"></h2>
    </header>
    <div id="audio-prompt" style="text-align:center; padding:16px; background:#fff8f5; border-bottom:1px solid #ddd;">
  <button onclick="enableAudio()" style="background:#E8845A; color:#fff; border:none; padding:10px 20px; border-radius:20px; font-size:14px; cursor:pointer;">🔊 Tap to enable Jarvis voice</button>
</div>

<div id="chat-messages"></div>

    <div class="chat-input-area">
  <button id="mic-btn">🎤</button>
  <textarea id="chat-input" placeholder="Ask Jarvis anything..." rows="2"></textarea>
  <button id="send-btn">→</button>
</div>


  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="app.js"></script>

</body>
</html>
